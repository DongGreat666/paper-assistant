<svg xmlns="http://www.w3.org/2000/svg" width="2540" height="980" viewBox="0 0 2540 980">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="enc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="dec" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#059669"/>
      <stop offset="1" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="bottle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#db2777"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity=".13"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#334155"/>
    </marker>
    <marker id="skipArrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#f59e0b"/>
    </marker>
    <style>
      .title{font:700 34px "Microsoft YaHei","Segoe UI",sans-serif;fill:#0f172a}
      .subtitle{font:400 16px "Microsoft YaHei","Segoe UI",sans-serif;fill:#64748b}
      .section{font:700 15px "Microsoft YaHei","Segoe UI",sans-serif;letter-spacing:2px}
      .stage{font:700 17px "Microsoft YaHei","Segoe UI",sans-serif;fill:#fff}
      .op{font:500 13px "Microsoft YaHei","Segoe UI",sans-serif;fill:#e2e8f0}
      .shape{font:700 14px "JetBrains Mono","Consolas",monospace;fill:#fff}
      .small{font:500 12px "Microsoft YaHei","Segoe UI",sans-serif;fill:#64748b}
      .legend{font:600 13px "Microsoft YaHei","Segoe UI",sans-serif;fill:#334155}
      .flow{fill:none;stroke:#334155;stroke-width:3;marker-end:url(#arrow)}
      .skip{fill:none;stroke:#f59e0b;stroke-width:3;stroke-dasharray:9 7;marker-end:url(#skipArrow)}
      .skiplabel{font:700 12px "JetBrains Mono","Consolas",monospace;fill:#b45309}
    </style>
  </defs>

  <rect width="2540" height="980" rx="28" fill="url(#bg)"/>
  <text x="1270" y="58" text-anchor="middle" class="title">ResNet-UNet Architecture</text>
  <text x="1270" y="88" text-anchor="middle" class="subtitle">ResNet-34 encoder · U-Net decoder · semantic segmentation</text>

  <rect x="120" y="120" width="780" height="40" rx="20" fill="#dbeafe"/>
  <text x="510" y="146" text-anchor="middle" class="section" fill="#1d4ed8">ENCODER · FEATURE EXTRACTION</text>
  <rect x="1015" y="120" width="190" height="40" rx="20" fill="#f3e8ff"/>
  <text x="1110" y="146" text-anchor="middle" class="section" fill="#7e22ce">BRIDGE</text>
  <rect x="1320" y="120" width="1100" height="40" rx="20" fill="#d1fae5"/>
  <text x="1870" y="146" text-anchor="middle" class="section" fill="#047857">DECODER · SPATIAL RECOVERY</text>

  <!-- Main flow -->
  <path class="flow" d="M155 267 H220"/>
  <path class="flow" d="M378 267 C415 267 420 352 455 352"/>
  <path class="flow" d="M613 352 C650 352 655 437 690 437"/>
  <path class="flow" d="M848 437 C885 437 890 522 925 522"/>
  <path class="flow" d="M1083 522 C1108 522 1108 667 1140 667"/>
  <path class="flow" d="M1298 667 C1330 667 1330 522 1355 522"/>
  <path class="flow" d="M1513 522 C1548 522 1553 437 1590 437"/>
  <path class="flow" d="M1748 437 C1783 437 1788 352 1825 352"/>
  <path class="flow" d="M1983 352 C2018 352 2023 267 2060 267"/>
  <path class="flow" d="M2178 267 H2210"/>
  <path class="flow" d="M2330 267 H2370"/>

  <!-- Skip connections -->
  <path class="skip" d="M378 222 V188 H1904 V264"/>
  <text x="1140" y="181" text-anchor="middle" class="skiplabel">skip · 64 channels</text>
  <path class="skip" d="M613 307 V238 H1669 V349"/>
  <text x="1140" y="231" text-anchor="middle" class="skiplabel">skip · 64 channels</text>
  <path class="skip" d="M848 392 V288 H1434 V434"/>
  <text x="1140" y="281" text-anchor="middle" class="skiplabel">skip · 128 channels</text>
  <path class="skip" d="M1083 477 V338 H1190 V579 H1434 V519"/>
  <text x="1140" y="331" text-anchor="middle" class="skiplabel">skip · 256 channels</text>

  <!-- Input -->
  <g filter="url(#shadow)">
    <rect x="40" y="222" width="115" height="90" rx="18" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
  </g>
  <text x="97" y="252" text-anchor="middle" class="legend">INPUT</text>
  <text x="97" y="278" text-anchor="middle" class="small">RGB image</text>
  <text x="97" y="299" text-anchor="middle" class="small">256 × 256</text>

  <!-- Encoder cards -->
  <g transform="translate(220 222)" filter="url(#shadow)">
    <rect x="14" y="-14" width="158" height="90" rx="16" fill="#93c5fd" opacity=".42"/>
    <rect x="7" y="-7" width="158" height="90" rx="16" fill="#60a5fa" opacity=".6"/>
    <rect width="158" height="90" rx="16" fill="url(#enc)"/>
    <text x="79" y="27" text-anchor="middle" class="stage">Stem</text>
    <text x="79" y="49" text-anchor="middle" class="op">7×7 Conv · s2</text>
    <text x="79" y="73" text-anchor="middle" class="shape">64 × 128²</text>
  </g>
  <g transform="translate(455 307)" filter="url(#shadow)">
    <rect x="14" y="-14" width="158" height="90" rx="16" fill="#93c5fd" opacity=".42"/>
    <rect x="7" y="-7" width="158" height="90" rx="16" fill="#60a5fa" opacity=".6"/>
    <rect width="158" height="90" rx="16" fill="url(#enc)"/>
    <text x="79" y="27" text-anchor="middle" class="stage">Layer 1</text>
    <text x="79" y="49" text-anchor="middle" class="op">BasicBlock × 3</text>
    <text x="79" y="73" text-anchor="middle" class="shape">64 × 64²</text>
  </g>
  <g transform="translate(690 392)" filter="url(#shadow)">
    <rect x="14" y="-14" width="158" height="90" rx="16" fill="#93c5fd" opacity=".42"/>
    <rect x="7" y="-7" width="158" height="90" rx="16" fill="#60a5fa" opacity=".6"/>
    <rect width="158" height="90" rx="16" fill="url(#enc)"/>
    <text x="79" y="27" text-anchor="middle" class="stage">Layer 2</text>
    <text x="79" y="49" text-anchor="middle" class="op">BasicBlock × 4 · s2</text>
    <text x="79" y="73" text-anchor="middle" class="shape">128 × 32²</text>
  </g>
  <g transform="translate(925 477)" filter="url(#shadow)">
    <rect x="14" y="-14" width="158" height="90" rx="16" fill="#93c5fd" opacity=".42"/>
    <rect x="7" y="-7" width="158" height="90" rx="16" fill="#60a5fa" opacity=".6"/>
    <rect width="158" height="90" rx="16" fill="url(#enc)"/>
    <text x="79" y="27" text-anchor="middle" class="stage">Layer 3</text>
    <text x="79" y="49" text-anchor="middle" class="op">BasicBlock × 6 · s2</text>
    <text x="79" y="73" text-anchor="middle" class="shape">256 × 16²</text>
  </g>

  <!-- Bottleneck -->
  <g transform="translate(1140 622)" filter="url(#shadow)">
    <rect x="14" y="-14" width="158" height="90" rx="16" fill="#c084fc" opacity=".35"/>
    <rect x="7" y="-7" width="158" height="90" rx="16" fill="#a855f7" opacity=".55"/>
    <rect width="158" height="90" rx="16" fill="url(#bottle)"/>
    <text x="79" y="27" text-anchor="middle" class="stage">Layer 4</text>
    <text x="79" y="49" text-anchor="middle" class="op">BasicBlock × 3 · s2</text>
    <text x="79" y="73" text-anchor="middle" class="shape">512 × 8²</text>
  </g>

  <!-- Decoder cards -->
  <g transform="translate(1355 477)" filter="url(#shadow)">
    <rect x="14" y="-14" width="158" height="90" rx="16" fill="#6ee7b7" opacity=".38"/>
    <rect x="7" y="-7" width="158" height="90" rx="16" fill="#34d399" opacity=".58"/>
    <rect width="158" height="90" rx="16" fill="url(#dec)"/>
    <text x="79" y="27" text-anchor="middle" class="stage">Decoder 4</text>
    <text x="79" y="49" text-anchor="middle" class="op">Up 2× · Concat · Conv ×2</text>
    <text x="79" y="73" text-anchor="middle" class="shape">256 × 16²</text>
  </g>
  <g transform="translate(1590 392)" filter="url(#shadow)">
    <rect x="14" y="-14" width="158" height="90" rx="16" fill="#6ee7b7" opacity=".38"/>
    <rect x="7" y="-7" width="158" height="90" rx="16" fill="#34d399" opacity=".58"/>
    <rect width="158" height="90" rx="16" fill="url(#dec)"/>
    <text x="79" y="27" text-anchor="middle" class="stage">Decoder 3</text>
    <text x="79" y="49" text-anchor="middle" class="op">Up 2× · Concat · Conv ×2</text>
    <text x="79" y="73" text-anchor="middle" class="shape">128 × 32²</text>
  </g>
  <g transform="translate(1825 307)" filter="url(#shadow)">
    <rect x="14" y="-14" width="158" height="90" rx="16" fill="#6ee7b7" opacity=".38"/>
    <rect x="7" y="-7" width="158" height="90" rx="16" fill="#34d399" opacity=".58"/>
    <rect width="158" height="90" rx="16" fill="url(#dec)"/>
    <text x="79" y="27" text-anchor="middle" class="stage">Decoder 2</text>
    <text x="79" y="49" text-anchor="middle" class="op">Up 2× · Concat · Conv ×2</text>
    <text x="79" y="73" text-anchor="middle" class="shape">64 × 64²</text>
  </g>
  <g transform="translate(2060 222)" filter="url(#shadow)">
    <rect x="14" y="-14" width="118" height="90" rx="16" fill="#6ee7b7" opacity=".38"/>
    <rect x="7" y="-7" width="118" height="90" rx="16" fill="#34d399" opacity=".58"/>
    <rect width="118" height="90" rx="16" fill="url(#dec)"/>
    <text x="59" y="27" text-anchor="middle" class="stage">Decoder 1</text>
    <text x="59" y="49" text-anchor="middle" class="op">Up + Concat</text>
    <text x="59" y="73" text-anchor="middle" class="shape">64 × 128²</text>
  </g>

  <!-- Final upsampling and output -->
  <g transform="translate(2210 222)" filter="url(#shadow)">
    <rect width="120" height="90" rx="16" fill="#047857"/>
    <text x="60" y="27" text-anchor="middle" class="stage">Final Up</text>
    <text x="60" y="49" text-anchor="middle" class="op">TransConv 2×</text>
    <text x="60" y="73" text-anchor="middle" class="shape">32 × 256²</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="2370" y="222" width="130" height="90" rx="18" fill="#fff" stroke="#a7f3d0" stroke-width="2"/>
    <text x="2435" y="250" text-anchor="middle" class="legend">OUTPUT</text>
    <text x="2435" y="275" text-anchor="middle" class="small">1×1 Conv</text>
    <text x="2435" y="298" text-anchor="middle" class="small">N_classes × 256²</text>
  </g>

  <!-- Architecture notes -->
  <g transform="translate(335 770)">
    <rect width="600" height="145" rx="22" fill="#fff" stroke="#dbeafe" stroke-width="2"/>
    <circle cx="34" cy="34" r="15" fill="#2563eb"/>
    <text x="62" y="40" class="legend">Residual BasicBlock</text>
    <text x="30" y="75" class="small">3×3 Conv → BN → ReLU → 3×3 Conv → BN → Add → ReLU</text>
    <text x="30" y="104" class="small">1×1 projection shortcut is used when stride or channels change.</text>
  </g>
  <g transform="translate(1305 770)">
    <rect width="600" height="145" rx="22" fill="#fff" stroke="#d1fae5" stroke-width="2"/>
    <circle cx="34" cy="34" r="15" fill="#059669"/>
    <text x="62" y="40" class="legend">DecoderBlock</text>
    <text x="30" y="75" class="small">2×2 Transposed Conv → Concatenate skip feature → Conv block ×2</text>
    <text x="30" y="104" class="small">Final upsampling restores the original 256 × 256 resolution.</text>
  </g>

  <g transform="translate(940 930)">
    <rect width="18" height="18" rx="5" fill="url(#enc)"/><text x="27" y="14" class="legend">Encoder</text>
    <rect x="110" width="18" height="18" rx="5" fill="url(#bottle)"/><text x="137" y="14" class="legend">Bottleneck</text>
    <rect x="250" width="18" height="18" rx="5" fill="url(#dec)"/><text x="277" y="14" class="legend">Decoder</text>
    <line x1="365" y1="9" x2="410" y2="9" class="skip"/><text x="425" y="14" class="legend">Skip connection</text>
  </g>
</svg>
